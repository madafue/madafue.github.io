<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Forensics Lab | Madafue</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        .forensics-container { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
        .text-input { width: 100%; height: 200px; padding: 1rem; font-family: monospace; border: 2px inset #ddd; resize: vertical;}
        .analyze-btn { padding: 0.5rem 2rem; font-weight: bold; cursor: pointer; align-self: flex-start; }
        .results-panel { background: #f5f5f5; border: 2px inset #ddd; padding: 1rem; margin-top: 1rem; min-height: 100px;}
    </style>
</head>
<body>
    <div id="site-wrapper">
        <header class="site-header">
            <h1>Control Panel</h1>
        </header>

        <nav class="site-nav">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/trophy-case/">Trophy Case</a></li>
                <li><a href="/tools/" class="current">Tools</a></li>
                <li><a href="/library/">Library</a></li>
            </ul>
        </nav>

        <main class="site-content">
            <section class="tools-intro">
                <h2>Text Forensics Lab</h2>
                <p>Paste an English text below. The client-side AI will analyze the structural syntax to predict the author's native language.</p>
            </section>

            <section class="forensics-container">
                <textarea id="lab-input" class="text-input" placeholder="Paste essay or text here..."></textarea>
                
                <div id="highlight-box" class="highlight-box"></div>

                <div style="display: flex; gap: 1rem;">
                    <button id="analyze-btn" class="analyze-btn">Run Analysis</button>
                    <button id="reset-btn" class="reset-btn">Edit Text</button>
                </div>
                
                <div id="results-panel" class="results-panel">
                    <strong>System Output:</strong> <br>
                    <span id="output-text">Awaiting input...</span>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <p>&copy; 2026 Adam Mawji.</p>
        </footer>
    </div> 

    <script src="stylometry.js"></script>
</body>
</html>
