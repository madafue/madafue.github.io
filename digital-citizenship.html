<section id="content"><div class="container"><div class="mainbody zn_has_sidebar"><div class="row "><div class="span9 zn_float_right zn_content"><h1 class="page-title">Digital Citizenship</h1><p>In today’s world most everyone has some access to the Internet. Even my 14 month old grandson was immediately drawn to his granddad’s iPad the other day and somehow he knew how to turn it off and on. By watching his older brother he also knew that somehow if he swiped his fingers across the screen something would happen. What he doesn’t know; however, is how to safely navigate the net. He doesn’t know how to use the net and of course he doesn’t know how to keep himself safe. Not much different from my 13 year old niece and even my 20 year old son.</p>
<p>While the Internet is becoming more and more part of our daily lives, being safe users means understanding what is appropriate. Navigating the digital world safely and ethically as well as responsibly and legally is part of the growing definition widely acceptable as becoming a digitally good citizen.</p>
<p>&nbsp;</p>
</div><div class="container"><div class="row "><div class="span3"><strong><h3>Technology is transforming how students learn, teachers teach, administrators manage and parents connect.</h3></strong>  </div>		<div class="span6">
		
		<iframe class="" width="570" height="320.625" src="http://www.youtube.com/embed/oCkTmZ0bF5Q?iv_load_policy=3&amp;enablejsapi=0&amp;wmode=transparent&amp;modestbranding=1&amp;rel=0&amp;showinfo=0&amp;feature=player_embedded" frameborder="0" allowfullscreen="" data-proportion="0.5625" style="height: 198px;"></iframe>
		</div>
	<div class="span3"><p>Digital Citizenship helps students, teachers, technology leaders and parents to understand how to use technology appropriately. Digital Citizenship helps to prepare technology users for a society full of technology. Digital citizenship area set of norms for appropriate and responsible technology use. Teaching digital citizenship helps define standards for appropriate technology usage. As students and faculty use technology they must also be taught appropriate internet conduct. It is not enough to create rules and policy, we must teach everyone to become responsible digital citizens in this technology based society in which we live. Digital Citizenship involves educating in a new way. </p></div></div></div><div class="container"><div class="row "><div class="span12"><h4 class="m_title">ISTE Standards for Students</h4><p>As internet tools and gadgets are invented at an exponential pace, it is up to educators to help provide guidance and understanding as students build the dimension of their digital footprint. According to ISTE standards for students, digital citizenship means
students understand human, cultural, and societal 
issues related to technology and practice legal and 
ethical behavior. 
<br>a. Advocate and practice safe, legal, and 
responsible use of information and technology
<br>b. Exhibit a positive attitude toward using 
technology that supports collaboration, 
learning, and productivity
<br>c. Demonstrate personal responsibility for 
lifelong learning
<br>d. Exhibit leadership for digital citizenship</p></div></div></div></section><!-- end #content -->
